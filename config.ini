[settings]
# Replace with your own folders before running.
input_dir = input_pdf
output_dir = output_pdf

# Can be empty. Example: prefix =
prefix = redacted_

log_mode = minimal
pause_on_exit = error
error_log = last_run_errors.log

literal_keywords =
    # Plain words/phrases. Case-insensitive.
    Internal Use
    Confidential
    Proprietary
    Created on

regex_keywords =
    # One regex per line. \s+ = one or more spaces, \s* = optional spaces.
    \bdraft\b
    \bdo\s+not\s+distribute\b

exclude_literal_keywords =
    # If matched, line will be kept (not removed).

exclude_regex_keywords =
    # If matched, line will be kept (not removed).
